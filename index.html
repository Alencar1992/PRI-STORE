<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>PRI STORE</title>
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4285f4">
  
  <link rel="apple-touch-icon" href="iconA.png">
  <link rel="icon" sizes="192x192" href="iconA.png">

  <style>
    /* Variáveis Nativas e Escalas de Sombra 3D */
    :root {
      --bg-color: #e0e5ec;
      --sidebar-color: rgba(255, 255, 255, 0.7);
      --primary-blue: #4285f4;
      --text-color: #333;
      --card-bg: linear-gradient(145deg, #ffffff, #e6e6e6);
      --shadow-3d: 8px 8px 16px #bebebe, -8px -8px 16px #ffffff;
      --inset-3d: inset 8px 8px 16px #bebebe, inset -8px -8px 16px #ffffff;
      --modal-bg: rgba(255, 255, 255, 0.85);
    }

    body.dark-mode {
      --bg-color: #1a1a1a;
      --sidebar-color: rgba(30, 30, 30, 0.8);
      --primary-blue: #bb86fc;
      --text-color: #e0e0e0;
      --card-bg: linear-gradient(145deg, #2c2c2c, #1f1f1f);
      --shadow-3d: 8px 8px 16px #0b0b0b, -8px -8px 16px #292929;
      --inset-3d: inset 8px 8px 16px #0b0b0b, inset -8px -8px 16px #292929;
      --modal-bg: rgba(30, 30, 30, 0.85);
    }

    body { 
      margin: 0; display: flex; font-family: 'Segoe UI', Tahoma, sans-serif; 
      background-color: var(--bg-color); color: var(--text-color); 
      height: 100vh; overflow: hidden; transition: background-color 0.3s;
      background-size: cover; background-position: center;
      background-attachment: fixed;
    }

    /* Botão Flutuante do Menu */
    #toggle-btn { 
      position: fixed; top: 15px; left: 15px; z-index: 1001;
      background: var(--modal-bg); color: var(--text-color); border: none; 
      padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 20px; 
      box-shadow: var(--shadow-3d); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }

    /* Menu Lateral (Sidebar) */
    #sidebar { 
      width: 250px; background: var(--sidebar-color);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255,255,255,0.2); 
      display: flex; flex-direction: column; transition: transform 0.3s ease, width 0.3s ease; 
      z-index: 900; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      padding-top: 70px;
    }
    
    #sidebar.collapsed { width: 70px; }
    #sidebar.collapsed .menu-text, #sidebar.collapsed h3 { display: none; }
    
    .menu-item { display: flex; align-items: center; padding: 15px; color: var(--text-color); text-decoration: none; cursor: pointer; transition: 0.2s; }
    .menu-item:hover { background-color: rgba(0,0,0,0.05); }
    .menu-icon { font-size: 20px; margin-right: 15px; }

    /* Área Central */
    #main-content { 
      flex: 1; padding: 20px; overflow-y: auto; display: flex; 
      flex-direction: column; position: relative; padding-top: 70px; 
    }
    #area-botoes { display: flex; gap: 25px; flex-wrap: wrap; margin-top: 20px; flex: 1; justify-content: center; align-content: flex-start; }

    /* Cards dos Apps com efeito 3D */
    .app-card {
      position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 140px; height: 140px; background: var(--card-bg); border-radius: 20px;
      text-decoration: none; color: var(--text-color); 
      box-shadow: var(--shadow-3d); transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .app-card:active { box-shadow: var(--inset-3d); transform: scale(0.95); }
    
    .app-emoji { font-size: 45px; margin-bottom: 10px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); }
    .app-name { font-weight: 700; font-size: 13px; text-align: center; }
    
    /* Botões de Ação no Card */
    .card-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; }
    .card-btn { 
      background: var(--bg-color); border: none; border-radius: 50%; cursor: pointer; 
      padding: 6px; font-size: 12px; box-shadow: var(--shadow-3d); transition: 0.2s; 
    }
    .card-btn:active { box-shadow: var(--inset-3d); }

    /* Modais */
    .modal-overlay { 
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.3s;
    }
    .modal-overlay.show { opacity: 1; }
    
    .modal-box { 
      background: var(--modal-bg); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; 
      display: flex; flex-direction: column; gap: 15px; color: var(--text-color);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.2);
      transform: translateY(20px); transition: transform 0.3s;
    }
    .modal-overlay.show .modal-box { transform: translateY(0); }
    
    .modal-box input, .modal-box select { 
      padding: 12px; background: var(--bg-color); border: none; border-radius: 10px; 
      width: calc(100% - 24px); box-shadow: var(--inset-3d); color: var(--text-color); outline: none;
    }
    
    .btn-salvar { background: var(--primary-blue); color: white; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4); }
    .btn-fechar { background: transparent; color: var(--text-color); padding: 12px; border: 1px solid var(--text-color); border-radius: 10px; cursor: pointer; }

    /* Tela de Carregamento */
    #progress-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 9999;
      flex-direction: column; justify-content: center; align-items: center; color: white;
    }
    .progress-container { width: 80%; max-width: 300px; background: #333; border-radius: 20px; height: 15px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); margin-top: 15px;}
    #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #4285f4, #00d2ff); transition: width 0.2s; }
    #progress-text { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
    #progress-percent { font-size: 24px; font-weight: bold; margin-top: 10px; }

    /* Rodapé */
    footer { text-align: center; padding: 15px; margin-top: auto; font-size: 11px; font-weight: bold; opacity: 0.7; }
    .store-badges { display: flex; justify-content: center; gap: 10px; margin-bottom: 5px; }
    .store-badges img { height: 25px; filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.2)); }

    @media (max-width: 768px) {
      #sidebar { position: fixed; height: 100vh; transform: translateX(-100%); width: 250px; left: 0; top: 0; padding-top: 70px; }
      #sidebar.mobile-open { transform: translateX(0); } 
      #toggle-btn { position: fixed; top: 10px; left: 10px; z-index: 1001; }
    }
  </style>
</head>
<body>

  <button id="toggle-btn" onclick="toggleMenu()" title="Menu">☰</button>

  <nav id="sidebar">
    <h3 style="padding: 0 15px 5px 15px; margin-top: 10px;">Ajustes</h3>
    
    <a class="menu-item" onclick="abrirModal('modalApp')">
      <span class="menu-icon">➕</span><span class="menu-text">Novo App</span>
    </a>
    <a class="menu-item" onclick="abrirModal('modalPerfil')">
      <span class="menu-icon">🎨</span><span class="menu-text">Aparência</span>
    </a>
  </nav>

  <main id="main-content">
    <h2 style="text-align: center; margin-top: 0;">Meus Aplicativos</h2>
    <div id="area-botoes"></div>

    <footer>
      <div class="store-badges">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="App Store">
      </div>
      <div>Since @2026 - Versão 1.0 - DEV Alencar - Build 10.06.26</div>
    </footer>
  </main>

  <div id="modalApp" class="modal-overlay">
    <div class="modal-box">
      <h2 id="tituloModalApp" style="margin:0; text-align:center;">Configurar App</h2>
      <input type="hidden" id="inputId">
      <input type="text" id="inputNome" placeholder="Nome do Aplicativo">
      <input type="url" id="inputUrl" placeholder="Link Completo (https://...)">
      <input type="text" id="inputEmoji" placeholder="Emoji Principal">
      <button class="btn-salvar" onclick="salvarApp()">Gravar no Banco</button>
      <button class="btn-fechar" onclick="fecharModal('modalApp')">Voltar</button>
    </div>
  </div>

  <div id="modalPerfil" class="modal-overlay">
    <div class="modal-box">
      <h2 style="margin:0; text-align:center;">Estilo e Fundo</h2>
      
      <label style="font-size: 12px; font-weight: bold; margin-bottom: -10px;">Tema:</label>
      <select id="selectTema" onchange="aplicarTema(this.value)">
        <option value="claro">Tema Claro (Light)</option>
        <option value="escuro">Tema Escuro (Dark 3D)</option>
      </select>
      
      <label style="font-size: 12px; font-weight: bold; margin-bottom: -10px; margin-top: 10px;">Plano de Fundo:</label>
      <select id="selectFundo">
        <option value="galaxy.png">Galaxy</option>
        <option value="alien_planet.png">Planeta</option>
        <option value="toy_story.png">Toy Story</option>
        <option value="arte.png">Arte</option>
      </select>
      
      <button class="btn-salvar" onclick="salvarPerfil()">Aplicar Mudanças</button>
      <button class="btn-fechar" onclick="fecharModal('modalPerfil')">Voltar</button>
    </div>
  </div>

  <div id="progress-overlay">
    <div id="progress-text">Processando...</div>
    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-percent">0%</div>
  </div>

  <script>
    /**
     * URL de Conexão com o Google Sheets Backend
     */
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbxC0zdGPgr3N8yH0epvlsAwq8zeS7ERyK-kcKbLv3TuuUrQvM0a_fEtbeoZxN-s2_2SDg/exec';

    // === INICIALIZAÇÃO IMEDIATA ===
    // Agora o plano de fundo nativo e padrão é "galaxy.png" em vez de ficar vazio.
    let imagemFundoGlobal = localStorage.getItem('meuApp_Imagem') || "galaxy.png";
    let temaSalvo = localStorage.getItem('meuApp_Tema') || "claro";

    // Aplica as cores e fundo antes da página terminar de carregar (resolve FOUC)
    if (temaSalvo === 'escuro') document.body.classList.add('dark-mode');
    document.body.style.backgroundImage = `url('${imagemFundoGlobal}')`;

    /**
     * Lógica visual da barra de progresso (0 a 100%)
     */
    let loopProgresso;
    function iniciarProgresso(mensagem) {
      document.getElementById('progress-text').innerText = mensagem;
      document.getElementById('progress-bar').style.width = '0%';
      document.getElementById('progress-percent').innerText = '0%';
      document.getElementById('progress-overlay').style.display = 'flex';
      
      let progressoReal = 0;
      loopProgresso = setInterval(() => {
        progressoReal += Math.floor(Math.random() * 10) + 1;
        if (progressoReal > 90) progressoReal = 90; 
        document.getElementById('progress-bar').style.width = progressoReal + '%';
        document.getElementById('progress-percent').innerText = progressoReal + '%';
      }, 150);
    }

    /**
     * Finaliza a barra de progresso completando para 100% e ocultando a tela
     */
    function finalizarProgresso() {
      clearInterval(loopProgresso);
      document.getElementById('progress-bar').style.width = '100%';
      document.getElementById('progress-percent').innerText = '100%';
      setTimeout(() => { document.getElementById('progress-overlay').style.display = 'none'; }, 600);
    }

    /**
     * Abre/fecha o menu lateral baseado no tamanho da tela (Mobile/Desktop)
     */
    function toggleMenu() { 
      const sidebar = document.getElementById('sidebar');
      if(window.innerWidth <= 768) sidebar.classList.toggle('mobile-open');
      else sidebar.classList.toggle('collapsed');
    }

    /**
     * Abre janelas modais de forma animada e atualiza seus campos padrão
     */
    function abrirModal(id) { 
      const overlay = document.getElementById(id);
      overlay.style.display = 'flex';
      setTimeout(() => overlay.classList.add('show'), 10);
      
      // Sincroniza os selects do perfil com o que está na memória atual
      if(id === 'modalPerfil') {
         document.getElementById('selectTema').value = localStorage.getItem('meuApp_Tema') || 'claro';
         document.getElementById('selectFundo').value = imagemFundoGlobal;
      }
    }

    /**
     * Fecha janelas modais e limpa formulários residuais
     */
    function fecharModal(id) { 
      const overlay = document.getElementById(id);
      overlay.classList.remove('show');
      setTimeout(() => { overlay.style.display = 'none'; }, 300);
      document.getElementById('inputId').value = ''; 
    }

    /**
     * Alterna classes CSS para Light e Dark Mode e salva na memória local
     */
    function aplicarTema(tema) {
      if(tema === 'escuro') {
        document.body.classList.add('dark-mode');
        localStorage.setItem('meuApp_Tema', 'escuro');
      } else {
        document.body.classList.remove('dark-mode');
        localStorage.setItem('meuApp_Tema', 'claro');
      }
    }

    /**
     * Permite copiar link para a área de transferência ou usar função nativa de enviar em celulares
     */
    function compartilharLink(url, nome) {
      if (navigator.share) {
        navigator.share({ title: nome, text: 'Acesse esta ferramenta:', url: url })
          .catch(err => console.error("Erro ao compartilhar", err));
      } else {
        navigator.clipboard.writeText(url).then(() => alert("Link copiado!"));
      }
    }

    /**
     * Busca informações no backend (Planilha Google) para popular a tela
     */
    function carregarDados() {
      iniciarProgresso('Sincronizando...');
      
      fetch(URL_SCRIPT)
        .then(res => res.json())
        .then(resposta => {
          finalizarProgresso();
          
          // Sincroniza informações de design
          if(resposta.config) {
            if (resposta.config.tema) aplicarTema(resposta.config.tema);
            
            // Só sobrescrevemos a imagem se houver registro no Google, senão deixamos o gta_6.png (padrão)
            if(resposta.config.imagem) {
              imagemFundoGlobal = resposta.config.imagem;
              document.body.style.backgroundImage = `url('${imagemFundoGlobal}')`;
              localStorage.setItem('meuApp_Imagem', imagemFundoGlobal);
            }
          }

          // Monta os apps recebidos na área central
          const container = document.getElementById('area-botoes');
          container.innerHTML = ''; 
          resposta.apps.forEach(app => {
            const card = document.createElement('div');
            card.className = 'app-card';
            card.innerHTML = `
              <div class="card-actions">
                <button class="card-btn" onclick="prepararEdicao(${app.id}, '${app.nome}', '${app.url}', '${app.emoji}')" title="Editar">⚙️</button>
                <button class="card-btn" onclick="compartilharLink('${app.url}', '${app.nome}')" title="Compartilhar">🔗</button>
              </div>
              <a href="${app.url}" target="_blank" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; align-items:center; width:100%;">
                <div class="app-emoji">${app.emoji}</div>
                <div class="app-name">${app.nome}</div>
              </a>
            `;
            container.appendChild(card);
          });
        })
        .catch(err => {
          clearInterval(loopProgresso);
          document.getElementById('progress-text').innerText = 'Modo Offline: Verifique a conexão.';
          setTimeout(() => finalizarProgresso(), 2000); 
        });
    }

    /**
     * Grava dados ou envia requisição de edição para a nuvem
     */
    function salvarApp() {
      const id = document.getElementById('inputId').value;
      const dados = {
        action: id ? "editar" : "adicionar",
        id: id ? parseInt(id) : null,
        nome: document.getElementById('inputNome').value,
        url: document.getElementById('inputUrl').value,
        emoji: document.getElementById('inputEmoji').value
      };

      fecharModal('modalApp');
      iniciarProgresso('Salvando aplicativo...');

      fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) })
      .then(() => {
        finalizarProgresso();
        setTimeout(() => carregarDados(), 700); 
      });
    }

    /**
     * Preenche o modal de edição e o abre
     */
    function prepararEdicao(id, nome, url, emoji) {
      document.getElementById('tituloModalApp').innerText = "Editar App";
      document.getElementById('inputId').value = id;
      document.getElementById('inputNome').value = nome;
      document.getElementById('inputUrl').value = url;
      document.getElementById('inputEmoji').value = emoji;
      abrirModal('modalApp');
    }

    /**
     * Grava as configurações de aparência no Banco de dados e localmente
     */
    function salvarPerfil() {
      fecharModal('modalPerfil');
      iniciarProgresso('Sincronizando aparência...');

      // Puxa informações diretas do novo campo select
      const tema = document.getElementById('selectTema').value;
      imagemFundoGlobal = document.getElementById('selectFundo').value;

      aplicarTema(tema); 
      document.body.style.backgroundImage = `url('${imagemFundoGlobal}')`;
      localStorage.setItem('meuApp_Imagem', imagemFundoGlobal);
      
      const dados = {
        action: "salvar_perfil",
        tema: tema,
        imagemBase64: imagemFundoGlobal // Mantive o nome da variável enviada para o Apps Script para evitar ter que alterar o backend
      };

      fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) })
      .then(() => finalizarProgresso());
    }

    // Aciona a consulta de dados inicial assim que possível
    carregarDados();
  </script>
</body>
</html>
